{{- $id := delimit (slice "download-box" (partial "functions/uid.html" .)) "-" -}}

{{- $url := .Get "url" | default "https://play.google.com" -}}
{{- $label := .Get "label" | default "Get it on Google Play" -}}

<div id="{{ $id }}" class="download-box-card-wrapper max-w-md mx-auto">
  <div
    class="w-full p-5 border border-solid dark:border-neutral-700 rounded-2xl shadow-lg bg-white dark:bg-neutral-900 hover:shadow-xl transition"
    style="border-color: #f97316;">

    <h3 class="font-bold text-xl text-neutral-900 dark:text-neutral-100 leading-tight">
      Download Our Games From:
    </h3>

    <div class="mt-3 border border-solid">
      <a
        href="{{ $url }}"
        target="_blank"
        rel="noopener noreferrer"
        class="flex items-center justify-center px-8 py-4 rounded-lg bg-[#f97316] text-white font-semibold text-lg shadow-md hover:bg-orange-600 transition w-fit mx-auto">

        <svg xmlns="http://www.w3.org/2000/svg"
             viewBox="0 0 24 24"
             class="w-6 h-6 mr-3 fill-current text-white block">

          <path fill="currentColor"
            d="M22.018 13.298l-3.919 2.218-3.515-3.493 3.543-3.521 3.891 2.202a1.49 1.49 0 0 1 0 2.594zM1.337.924a1.486 1.486 0 0 0-.112.568v21.017c0 .217.045.419.124.6l11.155-11.087L1.337.924zm12.207 10.065l3.258-3.238L3.45.195a1.466 1.466 0 0 0-.946-.179l11.04 10.973zm0 2.067l-11 10.933c.298.036.612-.016.906-.183l13.324-7.54-3.23-3.21z"/>
        </svg>

        <span>{{ $label }}</span>
      </a>
    </div>

  </div>
</div>
